name: Publish release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact merged version to publish, without the v prefix
        type: string
        required: true

permissions:
  contents: read

concurrency:
  group: publish-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      sha: ${{ steps.release.outputs.sha }}
      prerelease: ${{ steps.release.outputs.prerelease }}
      npm_tag: ${{ steps.release.outputs.npm_tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
      - id: release
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          test "$GITHUB_REF" = "refs/heads/main" || { echo "Publish release must be dispatched from main" >&2; exit 1; }
          version=$(node -p 'require("./package.json").version')
          test "$version" = "$REQUESTED_VERSION" || { echo "main is $version, not $REQUESTED_VERSION" >&2; exit 1; }
          node scripts/prepare-release.mjs check
          if [[ "$version" == *-* ]]; then
            prerelease=true
            npm_tag=${version#*-}
            npm_tag=${npm_tag%%.*}
          else
            prerelease=false
            npm_tag=latest
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "npm_tag=$npm_tag" >> "$GITHUB_OUTPUT"

  cli:
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x64
            extension: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
            extension: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
            extension: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64
            extension: .exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build lg
        run: cargo build --locked --release -p layered-graphics-cli --target ${{ matrix.target }}
      - name: Archive Unix binary
        if: runner.os != 'Windows'
        shell: bash
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
          TARGET: ${{ matrix.target }}
          LABEL: ${{ matrix.label }}
        run: |
          mkdir -p release/package
          cp "target/$TARGET/release/lg" release/package/lg
          cp LICENSE release/package/LICENSE
          tar -C release/package -czf "release/layered-graphics-$VERSION-$LABEL.tar.gz" lg LICENSE
      - name: Archive Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
          TARGET: ${{ matrix.target }}
          LABEL: ${{ matrix.label }}
        run: |
          New-Item -ItemType Directory -Force release/package | Out-Null
          Copy-Item "target/$env:TARGET/release/lg.exe" release/package/lg.exe
          Copy-Item LICENSE release/package/LICENSE
          Compress-Archive -Path release/package/lg.exe,release/package/LICENSE -DestinationPath "release/layered-graphics-$env:VERSION-$env:LABEL.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: cli-${{ matrix.label }}
          path: release/layered-graphics-*
          if-no-files-found: error

  npm:
    needs: metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.2
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: cargo install wasm-bindgen-cli --version 0.2.126 --locked
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @layered-graphics/core build
      - run: pnpm --filter @layered-graphics/browser build
      - name: Pack public npm packages
        run: |
          mkdir -p "$GITHUB_WORKSPACE/release/npm"
          pnpm --filter @layered-graphics/core pack --pack-destination "$GITHUB_WORKSPACE/release/npm"
          pnpm --filter @layered-graphics/browser pack --pack-destination "$GITHUB_WORKSPACE/release/npm"
      - uses: actions/upload-artifact@v7
        with:
          name: npm-packages
          path: release/npm/*.tgz
          if-no-files-found: error

  extras:
    needs: metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
      - env:
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          mkdir -p release
          tar -czf "release/layered-graphics-$VERSION-specs.tar.gz" spec docs/spec
          tar -czf "release/layered-graphics-$VERSION-examples.tar.gz" \
            apps/site/public/showcase.kgfx \
            apps/site/public/readme-banner.kgfx \
            examples/readme-banner/accents.ops.json
      - uses: actions/upload-artifact@v7
        with:
          name: release-extras
          path: release/*.tar.gz
          if-no-files-found: error

  publish:
    needs: [metadata, cli, npm, extras]
    runs-on: ubuntu-latest
    environment: release
    env:
      HAS_CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN != '' }}
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
      - uses: actions/download-artifact@v8
        with:
          pattern: cli-*
          path: release
          merge-multiple: true
      - uses: actions/download-artifact@v8
        with:
          name: npm-packages
          path: release/npm
      - uses: actions/download-artifact@v8
        with:
          name: release-extras
          path: release
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Acquire crates.io OIDC token
        if: env.HAS_CARGO_REGISTRY_TOKEN != 'true'
        uses: rust-lang/crates-io-auth-action@v1
        id: crates-auth
      - name: Create the draft GitHub release and checksums
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.metadata.outputs.tag }}
          VERSION: ${{ needs.metadata.outputs.version }}
          PRERELEASE: ${{ needs.metadata.outputs.prerelease }}
          RELEASE_SHA: ${{ needs.metadata.outputs.sha }}
        run: |
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --target "$RELEASE_SHA" --draft --title "Layered Graphics $VERSION" --generate-notes
          fi
          (cd release && find . -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS)
          mapfile -d '' files < <(find release -type f -print0)
          gh release upload "$TAG" "${files[@]}" --clobber
      - name: Publish Rust crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN || steps.crates-auth.outputs.token }}
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          crate_has_version() {
            curl -fsSL "https://crates.io/api/v1/crates/$1" 2>/dev/null | jq -e --arg version "$VERSION" '.versions[]? | select(.num == $version)' >/dev/null
          }
          if ! crate_has_version layered-graphics; then
            cargo publish --locked -p layered-graphics
          fi
          for attempt in $(seq 1 30); do
            crate_has_version layered-graphics && break
            sleep 10
          done
          crate_has_version layered-graphics || { echo "layered-graphics did not appear in the registry" >&2; exit 1; }
          if ! crate_has_version layered-graphics-cli; then
            cargo publish --locked -p layered-graphics-cli
          fi
      - name: Publish npm packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ needs.metadata.outputs.version }}
          NPM_TAG: ${{ needs.metadata.outputs.npm_tag }}
        run: |
          for package in core browser; do
            name="@layered-graphics/$package"
            if npm view "$name@$VERSION" version >/dev/null 2>&1; then
              echo "$name@$VERSION is already published"
            else
              tarball=$(find release/npm -name "layered-graphics-$package-$VERSION.tgz" -print -quit)
              test -n "$tarball" || { echo "missing tarball for $name" >&2; exit 1; }
              npm publish "$tarball" --access public --tag "$NPM_TAG"
            fi
          done
      - name: Publish the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.metadata.outputs.tag }}
          PRERELEASE: ${{ needs.metadata.outputs.prerelease }}
        run: gh release edit "$TAG" --draft=false --prerelease="$PRERELEASE"
