name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.126 --locked

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Install browser
        run: pnpm --filter @layered-graphics/site exec playwright install --with-deps chromium

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Lint Rust
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build and verify the project banner
        run: ./examples/readme-banner/build.sh

      - name: Build and verify the editable showcase
        run: ./examples/showcase/build.sh

      - name: Verify checked visual outputs
        run: git diff --exit-code -- apps/site/public

      - name: Verify generated schemas are current
        run: ./scripts/generate-schemas.sh && git diff --exit-code -- spec

      - name: Check workspace
        run: pnpm check

      - name: Verify generated WASM bindings are current
        run: git diff --exit-code -- packages/core/src/generated

      - name: Test workspace
        run: pnpm test

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Run release budgets
        run: pnpm benchmark

  native-node:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: 22
          - os: macos-latest
            node: 24
          - os: windows-latest
            node: 24
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.2
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @layered-graphics/node test
